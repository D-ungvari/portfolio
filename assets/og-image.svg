  <text x="140" y="254" font-family="monospace" font-size="14" fill="#4af626"> в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•— в–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•”в•җв•җв•қ</text>
  <text x="140" y="272" font-family="monospace" font-size="14" fill="#4af626"> в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—</text>
  <text x="140" y="290" font-family="monospace" font-size="14" fill="#4af626"> в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•қ  в•ҡв•җв•җв•җв•қ  в•ҡв•җв•җв•җв•җв•җв•җв•қ</text>

  <text x="140" y="320" font-family="monospace" font-size="13" fill="#3a7a3a"> web developer. vanilla js enthusiast.</text>
