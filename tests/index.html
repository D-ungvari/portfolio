<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Terminal — Tests</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #cdd6f4;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      padding: 20px 40px;
    }
    h1 { color: #00d4ff; margin-bottom: 20px; font-size: 18px; }
    #test-output { white-space: pre-wrap; }
    #test-output div { min-height: 1.4em; }

    /* Hide the OS-shell scaffolding so it doesn't interfere with the
       human-facing test output when this page is opened in a real browser. */
    #os-shell { display: none; }
  </style>
</head>
<body data-active-pane="desktop">
  <h1>Portfolio Terminal — Test Suite</h1>
  <div id="test-output"></div>

  <!-- Mirror of the production OS-shell DOM so tests can assert on it. -->
  <div id="os-shell">
    <header id="taskbar" role="banner">
      <div class="bar-left">
        <button id="taskbar-launcher" type="button" class="bar-launcher" aria-label="Open launcher" title="Open launcher">ARCH</button>
        <div id="taskbar-workspaces" class="bar-workspaces" aria-label="Workspaces">
          <button type="button" class="bar-pill workspace-pill active" data-workspace="1" aria-current="true">[1]</button>
          <button type="button" class="bar-pill workspace-pill" data-workspace="2">[2]</button>
          <button type="button" class="bar-pill workspace-pill" data-workspace="3">[3]</button>
          <button type="button" class="bar-pill workspace-pill" data-workspace="4">[4]</button>
          <button type="button" class="bar-pill workspace-pill" data-workspace="5">[5]</button>
        </div>
        <div id="taskbar-running" role="toolbar" aria-label="Running applications"></div>
      </div>
      <div class="bar-center" aria-live="polite"></div>
      <div id="taskbar-right" class="bar-right">
        <div id="taskbar-tray" class="bar-stat-strip"></div>
        <button id="taskbar-notify-bell" type="button" class="bar-icon-btn" aria-label="Notifications" title="Notifications">
          <span class="bell-icon">^</span><span class="notify-badge"></span>
        </button>
      </div>
    </header>
    <main id="os-main" role="main">
      <section id="desktop-pane" role="application" aria-label="Project desktop" tabindex="0">
        <div id="desktop-wallpaper">
          <div id="icon-grid" role="grid" aria-label="Project icons"></div>
          <div id="trash-icon" role="button" aria-label="Trash" tabindex="0">🗑️</div>
        </div>
      </section>
      <div id="pane-divider" role="separator" aria-orientation="vertical" tabindex="0"></div>
      <section id="terminal-pane" class="terminal-pane">
        <div id="terminal" role="application" aria-label="Interactive terminal portfolio">
          <div id="terminal-bar">
            <span class="bar-dot red"></span>
            <span class="bar-dot yellow"></span>
            <span class="bar-dot green"></span>
            <span class="bar-title">visitor@dave ~ /portfolio</span>
          </div>
          <div id="terminal-body" aria-live="polite" aria-relevant="additions">
            <div id="output"></div>
            <div id="input-line" class="prompt prompt-shell">
              <div class="prompt-top">
                <span class="prompt-corner">╭─</span>
                <span class="prompt-segment prompt-user">visitor@dave-arch</span>
                <span class="prompt-segment prompt-cwd">~/portfolio</span>
                <span class="prompt-segment prompt-git">main !0 ?0</span>
              </div>
              <div class="prompt-bottom">
                <span class="prompt-corner">╰─</span><span class="prompt-lambda">λ</span><span class="prompt-spacer">&nbsp;</span>
                <span id="input-display"></span><span id="cursor" class="cursor" aria-hidden="true">█</span>
                <input type="text" id="command-input"
                       autofocus autocomplete="off"
                       spellcheck="false" autocapitalize="off"
                       aria-label="Terminal command input">
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <nav id="mobile-commands" aria-label="Quick commands">
      <button type="button" data-cmd="/help">/help</button>
      <button type="button" data-cmd="/projects">/projects</button>
      <button type="button" data-cmd="/about">/about</button>
      <button type="button" data-cmd="/contact">/contact</button>
    </nav>
    <div id="pane-toggle" role="tablist" aria-label="Pane selector">
      <button data-pane="desktop" role="tab" aria-selected="true">DESKTOP</button>
      <button data-pane="terminal" role="tab" aria-selected="false">TERMINAL</button>
    </div>
  </div>

  <!-- Mock prefers-reduced-motion BEFORE app scripts load so boot.js
       takes the synchronous path during tests (no timers, no splash). -->
  <script>
    (function() {
      var origMatchMedia = window.matchMedia;
      window.matchMedia = function(query) {
        if (typeof query === 'string' && query.indexOf('prefers-reduced-motion') !== -1) {
          return {
            matches: true,
            media: query,
            onchange: null,
            addListener: function() {},
            removeListener: function() {},
            addEventListener: function() {},
            removeEventListener: function() {},
            dispatchEvent: function() { return false; }
          };
        }
        if (origMatchMedia) return origMatchMedia.call(window, query);
        return {
          matches: false,
          media: query,
          onchange: null,
          addListener: function() {},
          removeListener: function() {},
          addEventListener: function() {},
          removeEventListener: function() {},
          dispatchEvent: function() { return false; }
        };
      };
    })();
  </script>

  <!-- Provide minimal CSS variables on :root so tests-os.js layout assertions pass.
       In production these come from css/tokens.css; the harness inlines them here. -->
  <style id="harness-tokens">
    :root {
      --color-bg: #1e1e2e;
      --color-surface: #313244;
      --color-primary: #cdd6f4;
      --color-dim: #6c7086;
      --color-glow: rgba(203, 166, 247, 0.28);
      --color-border: #45475a;
      --color-scrollbar: #45475a;
      --color-chip-bg: #181825;
      --color-arch: #1793D1;
      --color-ok: #a6e3a1;
      --color-fail: #f38ba8;
      --color-warn: #f9e2af;
      --font-mono: 'JetBrains Mono', 'Iosevka', 'Fira Code', ui-monospace, monospace;
      --terminal-width: 40%;
      --taskbar-height: 32px;
      --divider-width: 4px;
      --window-gap: 12px;
    }
  </style>

  <!-- Load app scripts (production order — mirrors index.html exactly) -->
  <script src="../js/persona-data.js"></script>
  <script src="../js/persona.js"></script>
  <script src="../js/session-store.js"></script>
  <script src="../js/notify.js"></script>
  <script src="../js/shortcuts.js"></script>
  <script src="../js/window-manager.js"></script>
  <script src="../js/workspaces.js"></script>
  <script src="../js/palette.js"></script>
  <script src="../js/shortcuts-cheatsheet.js"></script>
  <script src="../js/terminal.js"></script>
  <script src="../js/commands.js"></script>
  <script src="../js/projects.js"></script>
  <script src="../js/game-overlay.js"></script>
  <script src="../js/easter-eggs.js"></script>
  <script src="../js/neofetch.js"></script>
  <script src="../js/themes.js"></script>
  <script src="../js/matrix.js"></script>
  <script src="../js/extras.js"></script>
  <script src="../js/icon.js"></script>
  <script src="../js/desktop.js"></script>
  <script src="../js/context-menu.js"></script>
  <script src="../js/taskbar.js"></script>
  <script src="../js/os-commands.js"></script>
  <script src="../js/apps/settings.js"></script>
  <script src="../js/apps/mail.js"></script>
  <script src="../js/apps/cv-viewer.js"></script>
  <script src="../js/apps/apps-grid.js"></script>
  <script src="../js/apps/boring-view.js"></script>
  <script src="../js/app-commands.js"></script>
  <script src="../js/lore.js"></script>
  <script src="../js/fs.js"></script>
  <script src="../js/router.js"></script>
  <script src="../js/terminal-tabs.js"></script>
  <script src="../js/pane-toggle.js"></script>
  <script src="../js/splitter.js"></script>
  <script src="../js/boot.js"></script>
  <script src="../js/konami.js"></script>
  <script src="../js/idle.js"></script>

  <!-- Load test harness and tests -->
  <script src="test-harness.js"></script>
  <script src="tests.js"></script>
  <script src="tests-v2.js"></script>
  <script src="tests-v3.js"></script>
  <script src="tests-v4.js"></script>
  <script src="tests-v5.js"></script>
  <script src="tests-v6.js"></script>
  <script src="tests-v7.js"></script>
  <script src="tests-v8.js"></script>
  <script src="tests-os.js"></script>
  <script src="tests-workspaces.js"></script>
  <script src="tests-neofetch.js"></script>
  <script src="tests-arch.js"></script>

  <!-- Run tests.
       The Node runner (run-tests.js) calls TestHarness.run() itself, so
       we only auto-run from the browser path (where window.__JSDOM__ is
       absent). The runner sets a sentinel before dispatching DCL so it
       can dispatch DOMContentLoaded for module initializers without
       triggering a duplicate test run. -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.__SKIP_AUTORUN_TESTS__) return;
      TestHarness.run();
    });
  </script>
</body>
</html>
